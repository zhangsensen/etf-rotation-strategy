# ETF下载管理器配置文件
# 统一的ETF数据下载配置

# 数据源配置
source: "tushare"
tushare_token: "${TUSHARE_TOKEN}"  # 从环境变量获取，或替换为你的 token

# 数据目录配置
base_dir: "raw/ETF"
create_subdirs: true

# 时间范围配置 - 基于实际ETF上市时间优化
start_date: "20200102"  # 36只ETF从2020年开始
end_date: "20251014"     # 到今天（2025-10-14）
years_back: 6           # 下载最近6年数据，覆盖完整牛熊周期

# API请求配置
max_retries: 3
retry_delay: 1.0
request_delay: 0.2
timeout: 30

# 下载配置
batch_size: 50
parallel: false
download_types:
  - "daily"      # 日线数据
  # - "moneyflow"  # 资金流向数据（Tushare不提供ETF资金流向）
  # - "minutes"    # 分钟数据（较慢）
  # - "basic_info"  # 基础信息

# 输出配置
save_format: "parquet"  # parquet, csv
verbose: true

